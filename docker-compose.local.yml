services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gosnag
      POSTGRES_PASSWORD: gosnag
      POSTGRES_DB: gosnag
    volumes:
      - local_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gosnag"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  local_pgdata:
